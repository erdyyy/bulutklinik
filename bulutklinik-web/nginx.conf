server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # React SPA — bilinmeyen yolları index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API isteklerini backend container'a proxy'le
    location /api/ {
        proxy_pass         http://medicaai-api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # AI servis isteklerini ai container'a proxy'le
    # resolver: Docker internal DNS, lazy resolve — nginx starts even if AI is down
    location /ai/ {
        resolver           127.0.0.11 valid=10s;
        set $ai_upstream   http://medicaai-ai:8001;
        proxy_pass         $ai_upstream/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 20M;
    }

    # Swagger UI (production'da isteğe bağlı)
    location /swagger/ {
        proxy_pass         http://medicaai-api:8080/swagger/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Static asset cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
