version: '3.9'

################################################################################
# MedicaAI — Production
# Port tahsisi:  API → 8282  |  Web → 8083  |  AI → 8284
################################################################################

services:

  # ── .NET 8 REST API ────────────────────────────────────────────────────── #
  medicaai-api:
    image: ${BULUTKLINIK_API_IMAGE:-ghcr.io/OWNER/medicaai-api:latest}
    container_name: medicaai-api
    environment:
      ASPNETCORE_ENVIRONMENT:     Production
      ASPNETCORE_URLS:            http://+:8080
      ConnectionStrings__Default: ${BULUTKLINIK_DB_CONN}
      Jwt__Key:                   ${BULUTKLINIK_JWT_KEY}
      Jwt__Issuer:                ${BULUTKLINIK_JWT_ISSUER}
      Jwt__ExpiresInMinutes:      "60"
      # Netgsm SMS
      Netgsm__UserCode:  ${NETGSM_USER_CODE:-}
      Netgsm__Password:  ${NETGSM_PASSWORD:-}
      Netgsm__Header:    ${NETGSM_HEADER:-MedicaAI}
      Netgsm__Enabled:   ${NETGSM_ENABLED:-false}
      # SMTP Email
      Smtp__Host:        ${SMTP_HOST:-smtp.gmail.com}
      Smtp__Port:        ${SMTP_PORT:-587}
      Smtp__Username:    ${SMTP_USERNAME:-}
      Smtp__Password:    ${SMTP_PASSWORD:-}
      Smtp__FromName:    MedicaAI
      Smtp__Enabled:     ${SMTP_ENABLED:-false}
    networks:
      - medicaai_net
      - services_db       # postgres-db'ye erişim
    restart: unless-stopped

  # ── React Frontend (nginx) ─────────────────────────────────────────────── #
  medicaai-web:
    image: ${BULUTKLINIK_WEB_IMAGE:-ghcr.io/OWNER/medicaai-web:latest}
    container_name: medicaai-web
    depends_on:
      - medicaai-api
    ports:
      - "8083:80"
    networks:
      - medicaai_net
    restart: unless-stopped

  # ── Python AI Servisi ──────────────────────────────────────────────────── #
  medicaai-ai:
    image: ${BULUTKLINIK_AI_IMAGE:-ghcr.io/OWNER/medicaai-ai:latest}
    container_name: medicaai-ai
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY:    ${GOOGLE_API_KEY:-}
    ports:
      - "8284:8001"
    networks:
      - medicaai_net
    restart: unless-stopped

networks:
  medicaai_net:
    driver: bridge

  # Mevcut postgres-db container'ını içeren network
  services_db:
    external: true
    name: services_default
