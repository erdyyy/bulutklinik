name: CI/CD — MedicaAI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1. .NET testleri ───────────────────────────────────────────────────── #
  test:
    name: .NET Tests
    if: false   # geçici olarak devre dışı
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - run: dotnet restore
      - run: dotnet build --no-restore -c Release
      - run: dotnet test --no-build -c Release --verbosity normal

  # ── 2. Docker image build & push → GHCR ───────────────────────────────── #
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      owner: ${{ steps.meta.outputs.owner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set owner (lowercase)
        id: meta
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: MedicaAI.API/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/medicaai-api:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/medicaai-api:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: bulutklinik-web
          file: bulutklinik-web/Dockerfile
          push: true
          build-args: VITE_API_URL=/api
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/medicaai-web:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/medicaai-web:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push AI
        uses: docker/build-push-action@v5
        with:
          context: ai-service
          file: ai-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/medicaai-ai:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/medicaai-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. VPS'e deploy ───────────────────────────────────────────────────── #
  deploy:
    name: Deploy to VPS
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      # Güncel docker-compose.prod.yml dosyasını VPS'e kopyala
      - name: Copy compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "docker-compose.prod.yml"
          target:   "/root/medicaai/"

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          envs:     GHCR_TOKEN,GHCR_ACTOR,GHCR_OWNER
          script: |
            set -e

            # GHCR'a login (token workflow süresi boyunca geçerli)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

            # .env'deki image adlarını güncelle
            sed -i "s|^BULUTKLINIK_API_IMAGE=.*|BULUTKLINIK_API_IMAGE=ghcr.io/${GHCR_OWNER}/medicaai-api:latest|" /root/medicaai/.env
            sed -i "s|^BULUTKLINIK_WEB_IMAGE=.*|BULUTKLINIK_WEB_IMAGE=ghcr.io/${GHCR_OWNER}/medicaai-web:latest|" /root/medicaai/.env
            sed -i "s|^BULUTKLINIK_AI_IMAGE=.*|BULUTKLINIK_AI_IMAGE=ghcr.io/${GHCR_OWNER}/medicaai-ai:latest|" /root/medicaai/.env

            docker pull ghcr.io/${GHCR_OWNER}/medicaai-api:latest
            docker pull ghcr.io/${GHCR_OWNER}/medicaai-web:latest
            docker pull ghcr.io/${GHCR_OWNER}/medicaai-ai:latest

            cd /root/medicaai
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker logout ghcr.io
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_OWNER: ${{ needs.build-push.outputs.owner }}
