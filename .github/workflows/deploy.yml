name: CI/CD — MedicaAI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1. .NET testleri ───────────────────────────────────────────────────── #
  test:
    name: .NET Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - run: dotnet restore MedicaAI.sln
      - run: dotnet build MedicaAI.sln --no-restore -c Release
      - run: dotnet test MedicaAI.sln --no-build -c Release --verbosity minimal

  # ── 2. Docker image build & push → GHCR ───────────────────────────────── #
  build-push:
    name: Build & Push Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      owner: ${{ steps.meta.outputs.owner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set owner (lowercase)
        id: meta
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: MedicaAI.API/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/medicaai-api:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/medicaai-api:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: bulutklinik-web
          file: bulutklinik-web/Dockerfile
          push: true
          build-args: VITE_API_URL=/api
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/medicaai-web:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/medicaai-web:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push AI
        uses: docker/build-push-action@v5
        with:
          context: ai-service
          file: ai-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/medicaai-ai:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/medicaai-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. VPS'e deploy ───────────────────────────────────────────────────── #
  deploy:
    name: Deploy to VPS
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      # docker-compose.prod.yml dosyasını VPS'e kopyala
      - name: Copy compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "docker-compose.prod.yml"
          target:   "/root/medicaai/"

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          # Tüm secret'ları env olarak ilet — VPS'te .env'e yazılacak
          envs: >-
            GHCR_TOKEN,GHCR_ACTOR,GHCR_OWNER,
            DB_CONN,JWT_KEY,JWT_ISSUER,
            GOOGLE_API_KEY,LLM_PROVIDER,GEMINI_MODEL,
            ANTHROPIC_API_KEY,OPENAI_API_KEY,
            NETGSM_USER_CODE,NETGSM_PASSWORD,NETGSM_HEADER,NETGSM_ENABLED,
            SMTP_HOST,SMTP_PORT,SMTP_USERNAME,SMTP_PASSWORD,SMTP_ENABLED
          script: |
            set -e
            OWNER="${GHCR_OWNER}"
            DEPLOY_DIR="/root/medicaai"
            ENV_FILE="${DEPLOY_DIR}/.env"

            # GHCR login
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_ACTOR}" --password-stdin

            mkdir -p "${DEPLOY_DIR}"

            # .env'i sıfırdan CI secret'larından üret (VPS'te elle bir şey bırakmaya gerek yok)
            cat > "${ENV_FILE}" <<ENVEOF
            BULUTKLINIK_API_IMAGE=ghcr.io/${OWNER}/medicaai-api:latest
            BULUTKLINIK_WEB_IMAGE=ghcr.io/${OWNER}/medicaai-web:latest
            BULUTKLINIK_AI_IMAGE=ghcr.io/${OWNER}/medicaai-ai:latest
            BULUTKLINIK_DB_CONN=${DB_CONN}
            BULUTKLINIK_JWT_KEY=${JWT_KEY}
            BULUTKLINIK_JWT_ISSUER=${JWT_ISSUER}
            LLM_PROVIDER=${LLM_PROVIDER:-gemini}
            GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
            GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
            OPENAI_API_KEY=${OPENAI_API_KEY:-}
            NETGSM_USER_CODE=${NETGSM_USER_CODE:-}
            NETGSM_PASSWORD=${NETGSM_PASSWORD:-}
            NETGSM_HEADER=${NETGSM_HEADER:-MedicaAI}
            NETGSM_ENABLED=${NETGSM_ENABLED:-false}
            SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
            SMTP_PORT=${SMTP_PORT:-587}
            SMTP_USERNAME=${SMTP_USERNAME:-}
            SMTP_PASSWORD=${SMTP_PASSWORD:-}
            SMTP_ENABLED=${SMTP_ENABLED:-false}
            ENVEOF

            # Satır başı boşlukları temizle (heredoc indent artifact)
            sed -i 's/^[[:space:]]*//' "${ENV_FILE}"

            docker pull ghcr.io/${OWNER}/medicaai-api:latest
            docker pull ghcr.io/${OWNER}/medicaai-web:latest
            docker pull ghcr.io/${OWNER}/medicaai-ai:latest

            cd "${DEPLOY_DIR}"

            # Portu tutan orphan container'ları temizle
            for port in 8083 8284; do
              docker ps -q --filter "publish=${port}" | xargs -r docker stop 2>/dev/null || true
              docker ps -aq --filter "publish=${port}" | xargs -r docker rm -f 2>/dev/null || true
            done

            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            docker logout ghcr.io

            echo "=== Deploy tamamlandi ==="
            docker ps --format 'table {{.Names}}\t{{.Status}}' | grep medicaai
        env:
          GHCR_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR:        ${{ github.actor }}
          GHCR_OWNER:        ${{ needs.build-push.outputs.owner }}
          # Veritabanı & Auth
          DB_CONN:           ${{ secrets.DB_CONN }}
          JWT_KEY:           ${{ secrets.JWT_KEY }}
          JWT_ISSUER:        ${{ secrets.JWT_ISSUER }}
          # AI Provider
          LLM_PROVIDER:      ${{ secrets.LLM_PROVIDER }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL:      ${{ secrets.GEMINI_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          # SMS (opsiyonel)
          NETGSM_USER_CODE:  ${{ secrets.NETGSM_USER_CODE }}
          NETGSM_PASSWORD:   ${{ secrets.NETGSM_PASSWORD }}
          NETGSM_HEADER:     ${{ secrets.NETGSM_HEADER }}
          NETGSM_ENABLED:    ${{ vars.NETGSM_ENABLED }}
          # SMTP (opsiyonel)
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME:     ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD:     ${{ secrets.SMTP_PASSWORD }}
          SMTP_ENABLED:      ${{ vars.SMTP_ENABLED }}
