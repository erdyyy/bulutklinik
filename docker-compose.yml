version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bulutklinik_db
    environment:
      POSTGRES_DB:       bulutklinik_dev
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: BulutKlinik.API/Dockerfile
    container_name: bulutklinik_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT:          Development
      ASPNETCORE_URLS:                 http://+:8080
      ConnectionStrings__Default:      Host=postgres;Port=5432;Database=bulutklinik_dev;Username=postgres;Password=postgres
      Jwt__Key:                        BulutKlinik_Super_Secret_Key_Min32Chars_CHANGE_IN_PROD!!
      Jwt__Issuer:                     http://localhost:8080
      Jwt__ExpiresInMinutes:           "60"
    ports:
      - "8080:8080"

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: bulutklinik_ai
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:    postgresql+asyncpg://postgres:postgres@postgres:5432/bulutklinik_ai
      OPENAI_API_KEY:  ${OPENAI_API_KEY:-}
      OPENAI_MODEL:    gpt-4o
      DEBUG:           "false"
      UPLOAD_DIR:      uploads/photos
      ANNOTATED_DIR:   uploads/annotated
      JWT_SECRET:      BulutKlinik_Super_Secret_Key_Min32Chars_CHANGE_IN_PROD!!
      CORS_ORIGINS:    '["http://localhost:5173","http://localhost:3000","http://localhost:8080"]'
    ports:
      - "8001:8001"
    volumes:
      - ai_uploads:/app/uploads

volumes:
  pgdata:
  ai_uploads:
